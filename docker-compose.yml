version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18
    container_name: medusa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Qa121314!
      POSTGRES_DB: memory_moments_marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memory-moments
    # Опциональные настройки для production:
    # environment:
    #   POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    # restart: always

  # pgAdmin для управления БД через браузер (опционально)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: memory-moments-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@memory-moments.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - memory-moments
    # Опционально:
    # restart: always
    # volumes:
    #   - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  # pgadmin_data:
  #   driver: local

networks:
  memory-moments:
    driver: bridge
